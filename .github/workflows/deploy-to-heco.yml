name: Deploy Solution to HECO UAT

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name to deploy'
        required: true
        default: 'EventRegistration'
        type: string

env:
  SOLUTION_NAME: ${{ github.event.inputs.solution_name || 'EventRegistration' }}
  SOLUTION_FOLDER: src/EventRegistration
  SOLUTION_ZIP: EventRegistration_unmanaged.zip

permissions:
  contents: read

jobs:
  deploy-to-uat:
    runs-on: windows-latest
    name: Pack and deploy to HECO_UAT
    environment: heco-uat

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution from source
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: ${{ env.SOLUTION_FOLDER }}
          solution-file: ${{ env.SOLUTION_ZIP }}
          solution-type: Unmanaged

      - name: Verify packed solution zip
        shell: pwsh
        run: |
          if (Test-Path -Path "${{ env.SOLUTION_ZIP }}") {
            $size = (Get-Item "${{ env.SOLUTION_ZIP }}").Length / 1KB
            Write-Host "Solution packed: ${{ env.SOLUTION_ZIP }} ($([math]::Round($size, 1)) KB)"
          } else {
            Write-Host "Pack failed - zip not found"
            exit 1
          }

      - name: Wait for any pending Dataverse jobs to clear
        shell: pwsh
        run: |
          Write-Host "Waiting 60 seconds for Dataverse background jobs to clear..."
          Start-Sleep -Seconds 60
          Write-Host "Wait complete - proceeding with import"

      - name: Import solution to HECO_UAT
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.HECO_UAT_URL }}
          app-id: ${{ secrets.HECO_CLIENT_ID }}
          client-secret: ${{ secrets.HECO_CLIENT_SECRET }}
          tenant-id: ${{ secrets.HECO_TENANT_ID }}
          solution-file: ${{ env.SOLUTION_ZIP }}
          force-overwrite: true
          publish-changes: false
          skip-dependency-check: false
          run-asynchronously: true
          max-async-wait-time: 30
          deployment-settings-file: config/uat-deployment-settings.json

      - name: Publish customizations
        uses: microsoft/powerplatform-actions/publish-solution@v1
        with:
          environment-url: ${{ secrets.HECO_UAT_URL }}
          app-id: ${{ secrets.HECO_CLIENT_ID }}
          client-secret: ${{ secrets.HECO_CLIENT_SECRET }}
          tenant-id: ${{ secrets.HECO_TENANT_ID }}

      - name: Remove packed zip
        shell: pwsh
        run: |
          if (Test-Path "${{ env.SOLUTION_ZIP }}") {
            Remove-Item "${{ env.SOLUTION_ZIP }}" -Force
            Write-Host "Cleaned up zip"
          }

      - name: Confirm deployment
        shell: pwsh
        run: |
          Write-Host "EventRegistration deployed successfully to HECO_UAT"
          Write-Host "Environment: ${{ secrets.HECO_UAT_URL }}"
          Write-Host "Solution: ${{ env.SOLUTION_NAME }}"
          Write-Host "Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm UTC')"
